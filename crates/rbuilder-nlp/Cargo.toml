[package]
name = "rbuilder-nlp"
version = "0.1.0"
edition = "2021"
description = "Natural language query layer for rBuilder"
license = "MIT OR Apache-2.0"

[dependencies]
rbuilder-analysis = { path = "../rbuilder-analysis" }
rbuilder-error = { path = "../rbuilder-error" }
rbuilder-graph = { path = "../rbuilder-graph" }
rbuilder-project-config = { path = "../rbuilder-project-config" }
aho-corasick = "1"
fancy-regex = "0.11"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
strsim = "0.11"
unicode-normalization = "0.1"

[features]
default = ["nlp-patterns"]
nlp-patterns = []
nlp-cache = ["ndarray"]
nlp-llm = ["nlp-cache", "reqwest"]

[dependencies.ndarray]
version = "0.15"
optional = true

[dependencies.reqwest]
version = "0.11"
features = ["json"]
optional = true
