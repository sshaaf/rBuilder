[package]
name = "rbuilder-wasm"
version = "0.1.0"
edition = "2021"
description = "WASM graph engine for rBuilder dashboard"
license = "MIT OR Apache-2.0"

[lib]
crate-type = ["cdylib", "rlib"]

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bincode = "1"
