[package]
name = "rbuilder-registry"
version = "0.4.2"
edition = "2021"
description = "Language plugin registry for rBuilder"
license = "MIT OR Apache-2.0"

[dependencies]
rbuilder-config-formats = { path = "../rbuilder-config-formats" }
rbuilder-error = { path = "../rbuilder-error" }
rbuilder-graph = { path = "../rbuilder-graph" }
rbuilder-plugin-api = { path = "../rbuilder-plugin-api" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[dev-dependencies]
tempfile = { workspace = true }
