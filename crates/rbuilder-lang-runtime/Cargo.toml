[package]
name = "rbuilder-lang-runtime"
version = "0.4.2"
edition = "2021"
description = "Generic tree-sitter and regex language plugins for rBuilder"
license = "MIT OR Apache-2.0"

[dependencies]
rbuilder-plugin-api = { path = "../rbuilder-plugin-api" }
rbuilder-plugin-helpers = { path = "../rbuilder-plugin-helpers" }
regex = "1"
serde_json = "1"
tree-sitter = "0.25"

[dev-dependencies]
tree-sitter-c = "0.24"
