[package]
name = "rbuilder-plugin-api"
version = "0.4.2"
edition = "2021"
description = "Stable plugin API for rBuilder language and config format plugins"
license = "MIT OR Apache-2.0"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
thiserror = "1"
toml = "0.8"
tree-sitter = "0.25"
tracing = "0.1"
