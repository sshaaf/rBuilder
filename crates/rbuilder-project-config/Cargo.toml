[package]
name = "rbuilder-project-config"
version = "0.1.0"
edition = "2021"
description = "Project configuration analysis for rBuilder"
license = "MIT OR Apache-2.0"

[dependencies]
rbuilder-error = { path = "../rbuilder-error" }
rbuilder-extraction = { path = "../rbuilder-extraction" }
rbuilder-graph = { path = "../rbuilder-graph" }
rbuilder-plugin-api = { path = "../rbuilder-plugin-api" }
rbuilder-registry = { path = "../rbuilder-registry" }
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "0.8"

[dev-dependencies]
tempfile = { workspace = true }
