[package]
name = "rbuilder-semantic"
version = "0.4.2"
edition = "2021"
description = "Semantic analysis and IDL generation for rBuilder"
license = "MIT OR Apache-2.0"

[dependencies]
rbuilder-error = { path = "../rbuilder-error" }
rbuilder-graph = { path = "../rbuilder-graph" }
rbuilder-plugin-api = { path = "../rbuilder-plugin-api" }
handlebars = "4"
regex = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
