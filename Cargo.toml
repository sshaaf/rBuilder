[package]
name = "rbuilder"
version = "0.1.0"
edition = "2021"
authors = ["rBuilder Contributors"]
description = "AI-powered code knowledge graph system"
license = "MIT OR Apache-2.0"
repository = "https://github.com/yourusername/rbuilder"
readme = "README.md"
keywords = ["code-analysis", "graph", "ai", "mcp", "knowledge-graph"]
categories = ["development-tools", "command-line-utilities"]
build = "build.rs"

[workspace]
members = [".", "rbuilder-macros"]

[dependencies]
# Parsing & AST - Programming Languages
tree-sitter = "0.20"
tree-sitter-rust = { version = "0.20", optional = true }
tree-sitter-python = { version = "0.20", optional = true }
tree-sitter-typescript = { version = "0.20", optional = true }
tree-sitter-javascript = { version = "0.20", optional = true }
tree-sitter-go = { version = "0.20", optional = true }
tree-sitter-java = { version = "0.20", optional = true }
tree-sitter-c = { version = "0.20", optional = true }
tree-sitter-cpp = { version = "0.20", optional = true }
tree-sitter-ruby = { version = "0.20", optional = true }
tree-sitter-php = { version = "0.20", optional = true }

# Proc macros (Phase 7.2)
rbuilder-macros = { path = "rbuilder-macros", optional = true }

# Configuration Format Parsers
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "0.8"
quick-xml = "0.31"

# Graph Backend
indradb-lib = "4.0"
# rocksdb is pulled in by indradb-lib, no need for explicit dependency

# Graph Algorithms
petgraph = "0.6"
pathfinding = "4.0"

# Parallelization
rayon = "1.7"
tokio = { version = "1", features = ["full"] }
crossbeam = "0.8"

# MCP (Model Context Protocol) Integration
axum = { version = "0.7", optional = true }
tower-http = { version = "0.5", optional = true, features = ["fs", "cors"] }

# NLP - Pattern Matching & Local Processing
regex = "1"
aho-corasick = "1"
fancy-regex = "0.11"
unicode-normalization = "0.1"
strsim = "0.11"

# NLP - Embeddings & Similarity (optional)
ndarray = { version = "0.15", optional = true }

# LLM Integration (optional fallback)
reqwest = { version = "0.11", features = ["json"], optional = true }

# CLI & Output
clap = { version = "4", features = ["derive"] }
comfy-table = "7"
indicatif = "0.17"
console = "0.15"

# Templating (for IDL generation)
handlebars = "4"

# Hashing & Fingerprinting
blake3 = "1"
xxhash-rust = "0.8"

# Error Handling
anyhow = "1"
thiserror = "1"

# UUID
uuid = { version = "1", features = ["v4", "serde"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Markdown parsing
pulldown-cmark = "0.9"

# Plugin loading
libloading = { version = "0.8", optional = true }

# Serialization
bincode = "1.3"

# File discovery
ignore = "0.4"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1"
tempfile = "3"
pretty_assertions = "1"
insta = "1"

[build-dependencies]
toml = "0.8"
serde = { version = "1", features = ["derive"] }

[features]
default = ["bundle-full", "nlp-patterns", "mcp-server"]

# Backward-compatible alias
all-languages = ["bundle-full"]

# Individual language features (from languages.toml)
lang-rust = ["tree-sitter-rust"]
lang-python = ["tree-sitter-python"]
lang-typescript = ["tree-sitter-typescript"]
lang-javascript = ["tree-sitter-javascript"]
lang-go = ["tree-sitter-go"]
lang-java = ["tree-sitter-java"]
lang-kotlin = []
lang-csharp = []
lang-markdown = []
lang-c = ["tree-sitter-c"]
lang-cpp = ["tree-sitter-cpp"]
lang-ruby = ["tree-sitter-ruby"]
lang-php = ["tree-sitter-php"]

# Bundles (from languages.toml)
bundle-minimal = ["lang-rust", "lang-python"]
bundle-extended = [
    "bundle-minimal",
    "lang-typescript",
    "lang-javascript",
    "lang-go",
    "lang-java",
]
bundle-full = [
    "bundle-extended",
    "lang-kotlin",
    "lang-csharp",
    "lang-markdown",
]
bundle-extra = ["lang-c", "lang-ruby", "lang-php", "lang-cpp"]

# NLP Query Features (progressive enhancement)
nlp-patterns = []
nlp-cache = ["nlp-patterns", "ndarray"]
nlp-llm = ["nlp-cache", "reqwest"]

# Integration Features
mcp-server = ["axum", "tower-http"]
plugin-system = ["libloading"]
proc-macros = ["rbuilder-macros"]

[profile.release]
lto = true
codegen-units = 1
strip = true

[profile.bench]
inherits = "release"

[[bin]]
name = "rbuilder"
path = "src/main.rs"

[[bench]]
name = "parsing"
harness = false

[[bench]]
name = "graph"
harness = false

[[bench]]
name = "nlp"
harness = false
