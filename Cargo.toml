[package]
name = "rbuilder"
version = "0.1.0"
edition = "2021"
authors = ["rBuilder Contributors"]
description = "AI-powered code knowledge graph system"
license = "MIT OR Apache-2.0"
repository = "https://github.com/yourusername/rbuilder"
readme = "README.md"
keywords = ["code-analysis", "graph", "ai", "mcp", "knowledge-graph"]
categories = ["development-tools", "command-line-utilities"]

[dependencies]
# Parsing & AST - Programming Languages
tree-sitter = "0.20"
tree-sitter-rust = "0.20"
tree-sitter-python = "0.20"
tree-sitter-typescript = "0.20"
tree-sitter-javascript = "0.20"
tree-sitter-go = "0.20"
tree-sitter-java = "0.20"

# Configuration Format Parsers
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
toml = "0.8"
quick-xml = "0.31"

# Graph Backend
indradb-lib = "4.0"
# rocksdb is pulled in by indradb-lib, no need for explicit dependency

# Graph Algorithms
petgraph = "0.6"
pathfinding = "4.0"

# Parallelization
rayon = "1.7"
tokio = { version = "1", features = ["full"] }
crossbeam = "0.8"

# MCP (Model Context Protocol) Integration
axum = { version = "0.7", optional = true }
tower-http = { version = "0.5", optional = true, features = ["fs", "cors"] }

# NLP - Pattern Matching & Local Processing
regex = "1"
aho-corasick = "1"
fancy-regex = "0.11"
unicode-normalization = "0.1"
strsim = "0.11"

# NLP - Embeddings & Similarity (optional)
ndarray = { version = "0.15", optional = true }

# LLM Integration (optional fallback)
reqwest = { version = "0.11", features = ["json"], optional = true }

# CLI & Output
clap = { version = "4", features = ["derive"] }
comfy-table = "7"
indicatif = "0.17"
console = "0.15"

# Templating (for IDL generation)
handlebars = "4"

# Hashing & Fingerprinting
blake3 = "1"
xxhash-rust = "0.8"

# Error Handling
anyhow = "1"
thiserror = "1"

# UUID
uuid = { version = "1", features = ["v4", "serde"] }

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Markdown parsing
pulldown-cmark = "0.9"

# Plugin loading
libloading = { version = "0.8", optional = true }

# Serialization
bincode = "1.3"

# File discovery
ignore = "0.4"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1"
tempfile = "3"
pretty_assertions = "1"
insta = "1"

[features]
default = ["all-languages", "nlp-patterns", "mcp-server"]

# Language support
all-languages = []

# NLP Query Features (progressive enhancement)
nlp-patterns = []                           # Pattern-based NLP (no LLM, 60% queries)
nlp-cache = ["nlp-patterns", "ndarray"]     # + Learned patterns with embeddings (90% queries)
nlp-llm = ["nlp-cache", "reqwest"]          # + LLM fallback (98% queries)

# Integration Features
mcp-server = ["axum", "tower-http"]         # MCP server for AI agents
plugin-system = ["libloading"]              # External plugin loading

[profile.release]
lto = true
codegen-units = 1
strip = true

[profile.bench]
inherits = "release"

[[bin]]
name = "rbuilder"
path = "src/main.rs"

[[bench]]
name = "parsing"
harness = false

[[bench]]
name = "graph"
harness = false

[[bench]]
name = "nlp"
harness = false
