[languages.nim]
handler = "tree-sitter"
crate = "tree-sitter-nim"
extensions = ["nim", "nims"]
function_kinds = ["proc_declaration", "func_declaration", "method_declaration"]
class_kinds = ["type_declaration", "enum_declaration", "object_declaration"]
enable_complexity = true
