[languages.julia]
handler = "tree-sitter"
crate = "tree-sitter-julia"
grammar_export = "LANGUAGE"
extensions = ["jl"]
function_kinds = ["function_definition"]
class_kinds = ["struct_definition", "module_definition", "macro_definition", "abstract_definition"]
