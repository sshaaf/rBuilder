[languages.dart]
handler = "tree-sitter"
crate = "tree-sitter-dart"
grammar_export = "LANGUAGE"
extensions = ["dart"]
function_kinds = ["function_signature", "method_signature"]
class_kinds = ["class_definition", "enum_declaration", "extension_declaration", "mixin_declaration"]
