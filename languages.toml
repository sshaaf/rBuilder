# ---------------------------------------------------------------------------
# Tier 2 niche languages (Phase 11.1.2 batch 2)
# ---------------------------------------------------------------------------

[languages.ocaml]
handler = "tree-sitter"
crate = "tree-sitter-ocaml"
grammar_export = "LANGUAGE_OCAML"
extensions = ["ml"]
function_kinds = ["value_definition", "method_definition", "let_binding"]
class_kinds = ["module_definition", "class_definition", "type_definition"]
enable_complexity = true
enable_type_inference = false

[languages.perl]
handler = "tree-sitter"
crate = "ts-parser-perl"
grammar_export = "LANGUAGE"
extensions = ["pl", "pm"]
function_kinds = ["subroutine_declaration_statement", "method_declaration_statement"]
class_kinds = ["package_statement"]
enable_complexity = true
enable_type_inference = false

[languages.fortran]
handler = "tree-sitter"
crate = "tree-sitter-fortran"
grammar_export = "LANGUAGE"
extensions = ["f", "f90", "f03", "f08"]
function_kinds = ["function_statement", "subroutine_statement"]
class_kinds = ["derived_type_definition", "module_statement"]
enable_complexity = true
enable_type_inference = false

[languages.verilog]
handler = "tree-sitter"
crate = "tree-sitter-verilog"
grammar_export = "LANGUAGE"
extensions = ["v", "sv"]
function_kinds = ["function_declaration", "task_declaration"]
class_kinds = ["module_declaration", "class_declaration"]
enable_complexity = false
enable_type_inference = false

[languages.vhdl]
handler = "tree-sitter"
crate = "tree-sitter-vhdl"
grammar_export = "LANGUAGE"
extensions = ["vhd", "vhdl"]
function_kinds = ["function_declaration", "procedure_declaration"]
class_kinds = ["entity_declaration", "package_declaration"]
enable_complexity = false
enable_type_inference = false

[languages.cobol]
handler = "regex"
crate = ""
extensions = ["cob", "cbl", "cpy"]
function_kinds = ["PARAGRAPH", "PROCEDURE"]
class_kinds = []
enable_complexity = false
enable_type_inference = false

[[languages.cobol.regex_patterns]]
pattern = '(?m)^\s*([A-Z0-9][A-Z0-9-]*)\s*\.'
symbol_type = "function"

[languages.pascal]
handler = "tree-sitter"
crate = "tree-sitter-pascal"
grammar_export = "LANGUAGE"
extensions = ["pas", "pp", "dpr"]
function_kinds = ["declProc"]
class_kinds = ["declClass", "declEnum"]
enable_complexity = true
enable_type_inference = false

[languages.scheme]
handler = "regex"
crate = ""
extensions = ["scm", "ss", "sls"]
function_kinds = ["lambda", "definition"]
class_kinds = []
enable_complexity = false
enable_type_inference = false

[[languages.scheme.regex_patterns]]
pattern = '(?m)\(define\s+\(([^\s()]+)'
symbol_type = "function"

[[languages.scheme.regex_patterns]]
pattern = '(?m)\(define\s+([^\s()]+)'
symbol_type = "function"

[languages.zig]
handler = "tree-sitter"
crate = "tree-sitter-zig"
grammar_export = "LANGUAGE"
extensions = ["zig", "zon"]
function_kinds = ["function_declaration", "fn"]
class_kinds = ["struct", "enum"]
enable_complexity = true
enable_type_inference = false

[languages.fsharp]
handler = "tree-sitter"
crate = "tree-sitter-fsharp"
grammar_export = "LANGUAGE_FSHARP"
extensions = ["fs", "fsx"]
function_kinds = ["function_or_value_defn", "member_definition"]
class_kinds = ["class", "enum_type_defn"]
enable_complexity = true
enable_type_inference = false

[languages.crystal]
handler = "tree-sitter"
crate = "tree-sitter-crystal"
grammar_export = "LANGUAGE"
extensions = ["cr"]
function_kinds = ["def", "fun_def", "method_def"]
class_kinds = ["class_def", "module_def", "struct_def"]
enable_complexity = true
enable_type_inference = false

[languages.clojure]
handler = "regex"
crate = ""
extensions = ["clj", "cljs", "cljc", "edn"]
function_kinds = ["defn"]
class_kinds = []
enable_complexity = false
enable_type_inference = false

[[languages.clojure.regex_patterns]]
pattern = '(?m)\(defn\s+([A-Za-z_][\w\-\?\!\*\+<>=&]*)'
symbol_type = "function"

[[languages.clojure.regex_patterns]]
pattern = '(?m)\(defmacro\s+([A-Za-z_][\w\-\?\!\*\+<>=&]*)'
symbol_type = "macro"

[languages.assembly]
handler = "regex"
crate = ""
extensions = ["asm", "s", "nasm"]
function_kinds = ["label"]
class_kinds = []
enable_complexity = false
enable_type_inference = false

[[languages.assembly.regex_patterns]]
pattern = '(?m)^([A-Za-z_][\w]*):'
symbol_type = "function"

