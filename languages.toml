# ---------------------------------------------------------------------------
# Bundles (Phase 11.1.3 — hierarchical feature sets)
# ---------------------------------------------------------------------------

[bundles.minimal]
description = "Core web and systems languages"
languages = ["rust", "python", "javascript", "typescript", "go"]

[bundles.extended]
description = "Common production languages plus C-family, scripting, and multi-modal"
languages = [
    "rust", "python", "javascript", "typescript", "go",
    "java", "kotlin", "csharp", "markdown",
    "c", "cpp", "ruby", "php",
    "sql", "bash", "dockerfile", "github_actions", "gitlab_ci",
]

[bundles.full]
description = "Extended bundle plus high-priority Tier 2 languages"
languages = [
    "rust", "python", "javascript", "typescript", "go",
    "java", "kotlin", "csharp", "markdown",
    "c", "cpp", "ruby", "php",
    "sql", "bash", "dockerfile", "github_actions", "gitlab_ci",
    "swift", "scala", "elixir", "erlang", "dart", "lua",
    "haskell", "julia", "r", "nim",
]

[bundles.extra]
description = "All languages including niche Tier 2 grammars"
languages = [
    "rust", "python", "javascript", "typescript", "go",
    "java", "kotlin", "csharp", "markdown",
    "c", "cpp", "ruby", "php",
    "sql", "bash", "dockerfile", "github_actions", "gitlab_ci",
    "swift", "scala", "elixir", "erlang", "dart", "lua",
    "haskell", "julia", "r", "nim",
    "ocaml", "perl", "fortran", "verilog", "vhdl", "cobol",
    "pascal", "scheme", "zig", "fsharp", "crystal", "clojure", "assembly",
]
