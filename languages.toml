[languages.haskell]
handler = "tree-sitter"
crate = "tree-sitter-haskell"
grammar_export = "LANGUAGE"
extensions = ["hs", "lhs"]
function_kinds = ["function", "bind", "value_definition"]
class_kinds = ["data_type", "class_decl", "newtype"]
