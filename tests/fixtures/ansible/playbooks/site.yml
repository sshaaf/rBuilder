---
- name: web tier
  hosts: webservers
  become: true
  roles:
    - nginx
    - common
  tasks:
    - name: ensure nginx package
      apt:
        name: nginx
        state: present
      notify: restart nginx
    - name: risky shell
      shell: echo {{ user_input }}
  handlers:
    - name: restart nginx
      service:
        name: nginx
        state: restarted

- import_playbook: monitoring.yml
