<!DOCTYPE html>
<html>
<head>
  <title>Graph Test</title>
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <style>
    body { margin: 0; padding: 20px; background: #0f1117; color: #e6edf3; font-family: monospace; }
    #status { margin-bottom: 20px; padding: 10px; background: #161b22; border: 1px solid #30363d; }
    #graph { width: 800px; height: 600px; border: 2px solid #58a6ff; background: #0d1117; }
  </style>
</head>
<body>
  <div id="status">Loading...</div>
  <div id="graph"></div>

  <script>
    const status = document.getElementById('status');

    function log(msg) {
      console.log(msg);
      status.innerHTML += msg + '<br>';
    }

    log('1. Page loaded');
    log('2. vis-network available: ' + (typeof vis !== 'undefined'));

    async function test() {
      try {
        // Test API
        log('3. Fetching nodes...');
        const nodeRes = await fetch('/api/graph/nodes?limit=10');
        const nodeData = await nodeRes.json();
        log('4. Got ' + nodeData.nodes.length + ' nodes');

        log('5. Fetching edges...');
        const edgeRes = await fetch('/api/graph/edges?limit=100');
        const edgeData = await edgeRes.json();
        log('6. Got ' + edgeData.edges.length + ' edges');

        // Create simple graph
        log('7. Creating graph visualization...');
        const nodes = new vis.DataSet(nodeData.nodes.slice(0, 5).map(n => ({
          id: n.id,
          label: n.name.substring(0, 15)
        })));

        const nodeIds = new Set(Array.from(nodes.getIds()));
        const edges = new vis.DataSet(
          edgeData.edges
            .filter(e => nodeIds.has(e.from) && nodeIds.has(e.to))
            .slice(0, 10)
            .map((e, i) => ({ id: i, from: e.from, to: e.to }))
        );

        log('8. Rendering ' + nodes.length + ' nodes, ' + edges.length + ' edges');

        const container = document.getElementById('graph');
        const network = new vis.Network(container, { nodes, edges }, {
          physics: { enabled: false }
        });

        log('9. ✓ Graph rendered successfully!');

      } catch (err) {
        log('ERROR: ' + err.message);
        console.error(err);
      }
    }

    test();
  </script>
</body>
</html>
