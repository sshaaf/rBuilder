<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rBuilder D3 Explorer</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 10px 16px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    header h1 { font-size: 1rem; margin-right: auto; color: #58a6ff; }
    input, select, button { background: #21262d; border: 1px solid #30363d; color: #e6edf3; padding: 6px 10px; border-radius: 6px; font-size: 0.85rem; }
    button { cursor: pointer; background: #238636; border-color: #238636; }
    main { flex: 1; display: grid; grid-template-columns: 1fr 280px; overflow: hidden; }
    #graph { width: 100%; height: 100%; }
    aside { background: #161b22; border-left: 1px solid #30363d; padding: 12px; overflow-y: auto; font-size: 0.85rem; }
    .hint { color: #8b949e; margin-top: 8px; line-height: 1.4; }
    a { color: #58a6ff; text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <h1>D3 Force Graph</h1>
    <input id="query" value="type:Function" style="width:200px">
    <select id="depth">
      <option value="">No expansion</option>
      <option value="1">Depth 1</option>
      <option value="2" selected>Depth 2</option>
    </select>
    <select id="type-filter">
      <option value="">All types</option>
      <option value="Function">Function</option>
      <option value="Class">Class</option>
      <option value="Struct">Struct</option>
    </select>
    <input id="search" placeholder="Search..." style="width:140px">
    <button onclick="loadGraph()">Load</button>
    <a href="/">← Browser</a>
  </header>
  <main>
    <svg id="graph"></svg>
    <aside>
      <h2 id="detail-title">Node details</h2>
      <div id="detail"></div>
      <p class="hint">Drag nodes · scroll to zoom · click for details · double-click to expand neighbors</p>
    </aside>
  </main>
  <script src="/js/explorer.js"></script>
</body>
</html>
