<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rBuilder Graph Browser</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e6edf3; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 12px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    header h1 { font-size: 1.1rem; margin-right: auto; color: #58a6ff; }
    input, select, button { background: #21262d; border: 1px solid #30363d; color: #e6edf3; padding: 6px 10px; border-radius: 6px; font-size: 0.875rem; }
    button { cursor: pointer; background: #238636; border-color: #238636; }
    button:hover { background: #2ea043; }
    button.secondary { background: #21262d; border-color: #30363d; }
    main { flex: 1; display: grid; grid-template-columns: 280px 1fr 300px; overflow: hidden; }
    aside, .panel { background: #161b22; border-right: 1px solid #30363d; overflow-y: auto; padding: 12px; }
    .panel { border-right: none; border-left: 1px solid #30363d; }
    #graph { background: #0d1117; width: 100%; height: 100%; }
    .node { cursor: pointer; }
    .node circle { stroke: #30363d; stroke-width: 2px; }
    .node text { font-size: 10px; pointer-events: none; user-select: none; }
    .link { stroke: #30363d; stroke-width: 1.5px; }
    .stat { padding: 8px 0; border-bottom: 1px solid #21262d; font-size: 0.85rem; }
    .stat span { color: #8b949e; }
    .stat strong { float: right; color: #58a6ff; }
    #node-detail h3 { font-size: 0.95rem; margin-bottom: 8px; color: #58a6ff; }
    #node-detail p { font-size: 0.8rem; color: #8b949e; margin: 4px 0; }
    .label-tag { display: inline-block; background: #21262d; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; margin: 2px; }
    #search-results { margin-top: 8px; }
    .result-item { padding: 6px; cursor: pointer; border-radius: 4px; font-size: 0.8rem; }
    .result-item:hover { background: #21262d; }
    .loading { color: #8b949e; font-size: 0.85rem; padding: 8px; }
  </style>
</head>
<body>
  <header>
    <h1>rBuilder Graph Browser</h1>
    <input type="text" id="search" placeholder="Search nodes..." style="width:220px">
    <select id="type-filter">
      <option value="">All types</option>
      <option value="Function">Function</option>
      <option value="Class">Class</option>
      <option value="Struct">Struct</option>
      <option value="File">File</option>
      <option value="Module">Module</option>
    </select>
    <button onclick="loadGraph()">Refresh</button>
    <button class="secondary" onclick="exportDiagram()">Export</button>
    <button class="secondary" onclick="askNlp()">Ask NLP</button>
    <a href="/security.html" style="color:#58a6ff;font-size:0.875rem">Security</a>
    <a href="/explorer.html" style="color:#58a6ff;font-size:0.875rem">D3 Explorer</a>
    <a href="/dashboard.html" style="color:#58a6ff;font-size:0.875rem">Dashboard</a>
  </header>
  <main>
    <aside>
      <h2 style="font-size:0.9rem;margin-bottom:8px">Statistics</h2>
      <div id="stats"><div class="loading">Loading...</div></div>
      <h2 style="font-size:0.9rem;margin:12px 0 8px">Communities</h2>
      <div id="communities"><div class="loading">Loading...</div></div>
    </aside>
    <svg id="graph"></svg>
    <div class="panel">
      <div id="node-detail"><p>Select a node to view details.</p></div>
      <div id="search-results"></div>
    </div>
  </main>
  <script>
    const API = '';
    let svg, g, simulation, linkSel, nodeSel;
    let allNodes = [];
    let allEdges = [];

    const typeColors = {
      Function: '#58a6ff', Class: '#bc8cff', Struct: '#79c0ff',
      File: '#8b949e', Module: '#3fb950', ConfigKey: '#d29922',
      default: '#6e7681'
    };

    function initSvg() {
      const container = document.getElementById('graph');
      const width = container.clientWidth;
      const height = container.clientHeight;

      const el = d3.select('#graph');
      el.selectAll('*').remove();
      svg = el.attr('viewBox', [0, 0, width, height]);
      g = svg.append('g');

      svg.call(d3.zoom()
        .scaleExtent([0.1, 4])
        .on('zoom', (e) => g.attr('transform', e.transform))
      );
    }

    async function fetchJson(path) {
      const r = await fetch(API + path);
      if (!r.ok) throw new Error(await r.text());
      return r.json();
    }

    async function loadStats() {
      const stats = await fetchJson('/api/graph/stats');
      document.getElementById('stats').innerHTML = `
        <div class="stat"><span>Nodes</span><strong>${stats.node_count}</strong></div>
        <div class="stat"><span>Edges</span><strong>${stats.edge_count}</strong></div>
        <div class="stat"><span>Functions</span><strong>${stats.function_count}</strong></div>
        <div class="stat"><span>Classes</span><strong>${stats.class_count}</strong></div>
        <div class="stat"><span>Avg Complexity</span><strong>${(stats.avg_complexity||0).toFixed(1)}</strong></div>
      `;
    }

    async function loadCommunities() {
      const data = await fetchJson('/api/communities');
      document.getElementById('communities').innerHTML = data.communities.slice(0, 10).map(c =>
        `<div class="stat"><span>Community ${c.id}</span><strong>${c.member_count}</strong></div>`
      ).join('') || '<p class="loading">No communities detected</p>';
    }

    async function loadGraph() {
      const typeFilter = document.getElementById('type-filter').value;
      const nodeParams = new URLSearchParams({ limit: '300' });
      if (typeFilter) nodeParams.set('node_type', typeFilter);

      const [nodeData, edgeData] = await Promise.all([
        fetchJson('/api/graph/nodes?' + nodeParams),
        fetchJson('/api/graph/edges?limit=5000')
      ]);

      allNodes = nodeData.nodes;
      const allEdgesRaw = edgeData.edges;

      console.log(`Loaded ${allNodes.length} nodes, ${allEdgesRaw.length} total edges`);

      if (allNodes.length === 0) {
        document.getElementById('stats').innerHTML = '<p style="color:#d29922">No nodes found. Try a different filter.</p>';
        return;
      }

      const nodeIds = new Set(allNodes.map(n => n.id));
      allEdges = allEdgesRaw.filter(e => nodeIds.has(e.from) && nodeIds.has(e.to));

      console.log(`After filtering: ${allEdges.length} edges between loaded nodes`);

      initSvg();
      renderGraph();
      loadStats();
      loadCommunities();
    }

    function renderGraph() {
      const container = document.getElementById('graph');
      const width = container.clientWidth;
      const height = container.clientHeight;

      // Prepare data
      const nodes = allNodes.map(n => ({ ...n }));
      const links = allEdges.map(e => ({ source: e.from, target: e.to, ...e }));

      // Create links
      linkSel = g.selectAll('.link').data(links, d => `${d.source}-${d.target}`);
      linkSel.exit().remove();
      linkSel = linkSel.enter()
        .append('line')
        .attr('class', 'link')
        .merge(linkSel);

      // Create nodes
      nodeSel = g.selectAll('.node').data(nodes, d => d.id);
      nodeSel.exit().remove();

      const nodeEnter = nodeSel.enter()
        .append('g')
        .attr('class', 'node')
        .on('click', (_, d) => showNodeDetail(d.id))
        .call(d3.drag()
          .on('start', (e, d) => {
            if (!e.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x;
            d.fy = d.y;
          })
          .on('drag', (e, d) => {
            d.fx = e.x;
            d.fy = e.y;
          })
          .on('end', (e, d) => {
            if (!e.active) simulation.alphaTarget(0);
            d.fx = null;
            d.fy = null;
          })
        );

      nodeEnter.append('circle').attr('r', 8);
      nodeEnter.append('text')
        .attr('x', 12)
        .attr('y', 4)
        .attr('fill', '#e6edf3');

      nodeSel = nodeEnter.merge(nodeSel);
      nodeSel.select('circle')
        .attr('fill', d => typeColors[d.type] || typeColors.default);
      nodeSel.select('text')
        .text(d => d.name.length > 18 ? d.name.slice(0, 16) + '…' : d.name);

      // Create simulation
      simulation = d3.forceSimulation(nodes)
        .force('link', d3.forceLink(links).id(d => d.id).distance(60))
        .force('charge', d3.forceManyBody().strength(-200))
        .force('center', d3.forceCenter(width / 2, height / 2))
        .force('collision', d3.forceCollide().radius(20))
        .on('tick', () => {
          linkSel
            .attr('x1', d => d.source.x)
            .attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x)
            .attr('y2', d => d.target.y);

          nodeSel.attr('transform', d => `translate(${d.x},${d.y})`);
        });

      console.log('D3 graph initialized with', nodes.length, 'nodes and', links.length, 'links');
    }

    function showNodeDetail(nodeId) {
      const node = allNodes.find(n => n.id === nodeId);
      if (!node) return;
      const labels = (node.labels || []).map(l => `<span class="label-tag">${l}</span>`).join('');
      document.getElementById('node-detail').innerHTML = `
        <h3>${node.name}</h3>
        <p><strong>Type:</strong> ${node.type}</p>
        <p><strong>File:</strong> ${node.file || '?'}</p>
        <p><strong>Line:</strong> ${node.line || '?'}</p>
        ${node.complexity ? `<p><strong>Complexity:</strong> ${node.complexity}</p>` : ''}
        ${labels ? `<p><strong>Labels:</strong> ${labels}</p>` : ''}
        <button style="margin-top:8px;width:100%;background:#238636;border:1px solid #238636;color:#fff;padding:6px;border-radius:6px;cursor:pointer"
          onclick="loadSymbolInfo('${node.name}')">Load Symbol Info</button>
      `;
    }

    async function loadSymbolInfo(name) {
      try {
        const data = await fetchJson(`/api/symbol/${encodeURIComponent(name)}`);
        document.getElementById('node-detail').innerHTML = `
          <h3>${data.name}</h3>
          <p><strong>Type:</strong> ${data.type}</p>
          <p><strong>File:</strong> ${data.file || '?'}</p>
          <p><strong>Line:</strong> ${data.start_line || '?'}</p>
          ${data.complexity ? `<p><strong>Complexity:</strong> ${data.complexity}</p>` : ''}
          ${data.signature ? `<p><strong>Signature:</strong> <code style="font-size:0.75rem">${data.signature}</code></p>` : ''}
          ${data.callers && data.callers.length ? `<p><strong>Callers (${data.callers.length}):</strong> ${data.callers.slice(0,5).join(', ')}${data.callers.length > 5 ? '...' : ''}</p>` : ''}
          ${data.callees && data.callees.length ? `<p><strong>Callees (${data.callees.length}):</strong> ${data.callees.slice(0,5).join(', ')}${data.callees.length > 5 ? '...' : ''}</p>` : ''}
        `;
      } catch (err) {
        alert('Error loading symbol info: ' + err.message);
      }
    }

    async function searchNodes() {
      const q = document.getElementById('search').value.trim();
      if (!q) return;
      const data = await fetchJson('/api/graph/search?q=' + encodeURIComponent(q) + '&limit=20');
      document.getElementById('search-results').innerHTML = data.nodes.map(n =>
        `<div class="result-item" onclick="focusNode('${n.id}')">${n.name} <span style="color:#8b949e">(${n.type})</span></div>`
      ).join('') || '<p class="loading">No results</p>';
    }

    function focusNode(id) {
      showNodeDetail(id);

      // Highlight the node
      if (nodeSel) {
        nodeSel.select('circle')
          .attr('stroke', d => d.id === id ? '#58a6ff' : '#30363d')
          .attr('stroke-width', d => d.id === id ? 3 : 2);

        // Find the node and zoom to it
        const node = allNodes.find(n => n.id === id);
        if (node && node.x && node.y) {
          const transform = d3.zoomIdentity
            .translate(svg.node().clientWidth / 2 - node.x * 1.5, svg.node().clientHeight / 2 - node.y * 1.5)
            .scale(1.5);
          svg.transition().duration(750).call(d3.zoom().transform, transform);
        }
      }
    }

    async function askNlp() {
      const q = prompt('Ask a natural language question:');
      if (!q) return;
      const r = await fetch('/api/query', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question: q })
      });
      const result = await r.json();
      alert(result.answer || JSON.stringify(result));
    }

    async function exportDiagram() {
      const format = prompt('Export format (mermaid/dot/graphml):', 'mermaid');
      if (!format) return;
      const typeFilter = document.getElementById('type-filter').value;
      const query = typeFilter ? `type:${typeFilter}` : 'all';

      try {
        const data = await fetchJson(`/api/export?query=${encodeURIComponent(query)}&format=${format}&depth=2`);
        const blob = new Blob([data.content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `graph.${format === 'dot' ? 'dot' : format === 'graphml' ? 'graphml' : 'mmd'}`;
        a.click();
        URL.revokeObjectURL(url);
      } catch (err) {
        alert('Export failed: ' + err.message);
      }
    }

    document.getElementById('search').addEventListener('keydown', e => {
      if (e.key === 'Enter') searchNodes();
    });

    // Live search filter
    document.getElementById('search').addEventListener('input', e => {
      const q = e.target.value.toLowerCase().trim();
      if (!q) {
        if (nodeSel) nodeSel.style('opacity', 1);
        if (linkSel) linkSel.style('opacity', 1);
        return;
      }

      if (nodeSel) {
        nodeSel.style('opacity', d => d.name.toLowerCase().includes(q) ? 1 : 0.15);
      }
      if (linkSel) {
        linkSel.style('opacity', d => {
          const sourceName = typeof d.source === 'object' ? d.source.name : '';
          const targetName = typeof d.target === 'object' ? d.target.name : '';
          return sourceName.toLowerCase().includes(q) || targetName.toLowerCase().includes(q) ? 1 : 0.1;
        });
      }
    });

    document.getElementById('type-filter').addEventListener('change', loadGraph);

    window.addEventListener('resize', () => {
      if (simulation) {
        const container = document.getElementById('graph');
        const width = container.clientWidth;
        const height = container.clientHeight;
        simulation.force('center', d3.forceCenter(width / 2, height / 2)).alpha(0.3).restart();
      }
    });

    loadGraph().catch(err => {
      document.getElementById('stats').innerHTML = `<p class="loading">Error: ${err.message}. Run \`rbuilder init\` first.</p>`;
    });
  </script>
</body>
</html>
