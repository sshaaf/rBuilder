# Website — deploy
#
# Builds the static Next.js site under website/ and publishes to GitHub Pages.
# Allowed deployment branches (github-pages environment): main, docs
# Triggers: push to main|docs (website paths) or manual workflow_dispatch on either branch.

name: Website

on:
  push:
    branches: [main, docs]
    paths:
      - "website/**"
      - ".github/workflows/website.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: website-pages-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build static export
        env:
          # Custom domain Pages site: https://shaaf.dev/rBuilder/
          NEXT_PUBLIC_BASE_PATH: /rBuilder
          # Optional: repo Settings → Secrets → Actions → NEXT_PUBLIC_GA_MEASUREMENT_ID (G-…)
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/out

  deploy:
    needs: build
    # github-pages environment allows branches: main, docs
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/docs'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
