name: Blast Radius Perf & CLI I/O

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  perf-and-cli-io:
    name: Perf gates + CLI I/O contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-perf-cli-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release rbuilder
        run: cargo build --release --bin rbuilder

      - name: Blast-radius perf gates (non-ignored)
        run: cargo test --release --test phase16_blast_radius_perf

      - name: CLI I/O contract tests
        run: |
          cargo test --release --test cli_output
          cargo test --release --test subprocess_golden_path
          cargo test --release --test all_commands_sanity
